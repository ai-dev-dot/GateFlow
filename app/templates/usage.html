{% extends "base.html" %}
{% block title %}使用统计 — GateFlow{% endblock %}
{% block nav_usage %}active{% endblock %}
{% block header_title %}使用统计{% endblock %}

{% block content %}
<div class="space-y-4">
  <!-- Tabs + Date filters -->
  <div class="gf-card">
    <div class="gf-card-body flex flex-wrap items-center gap-4">
      <!-- Dimension tabs -->
      <div class="flex rounded-lg overflow-hidden" style="border: 1px solid var(--border);">
        <button onclick="switchDim('model')" id="tab-model" class="dim-tab active px-4 py-1.5 text-xs font-medium transition-colors">按模型</button>
        <button onclick="switchDim('department')" id="tab-department" class="dim-tab px-4 py-1.5 text-xs font-medium transition-colors">按部门</button>
        <button onclick="switchDim('user')" id="tab-user" class="dim-tab px-4 py-1.5 text-xs font-medium transition-colors">按用户</button>
        <button onclick="switchDim('agent_type')" id="tab-agent_type" class="dim-tab px-4 py-1.5 text-xs font-medium transition-colors">按客户端</button>
      </div>
      <!-- Date range -->
      <div class="flex items-center gap-2 ml-auto">
        <label class="text-xs" style="color: var(--text-muted);">日期</label>
        <input type="date" id="f-from" onchange="reload()" class="text-sm" style="padding: 5px 10px;">
        <span class="text-xs" style="color: var(--text-muted);">—</span>
        <input type="date" id="f-to" onchange="reload()" class="text-sm" style="padding: 5px 10px;">
        <button onclick="clearDates()" class="text-xs transition-colors" style="color: var(--text-muted); padding: 5px 8px;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-muted)'">重置</button>
      </div>
    </div>
  </div>

  <!-- Date range hint -->
  <div id="range-hint" class="flex items-center gap-2 px-1">
    <i data-lucide="calendar" style="width:13px;height:13px;color:var(--text-muted);"></i>
    <span id="range-text" class="text-xs" style="color: var(--text-muted);"></span>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="gf-card">
      <div class="gf-card-header">Token 用量（输入 / 输出）</div>
      <div class="gf-card-body">
        <div id="chart-bar" style="height: 350px;"></div>
      </div>
    </div>
    <div class="gf-card">
      <div class="gf-card-header">请求次数占比</div>
      <div class="gf-card-body">
        <div id="chart-pie" style="height: 350px;"></div>
      </div>
    </div>
  </div>
</div>

<style>
  .dim-tab {
    color: var(--text-muted);
    background: transparent;
  }
  .dim-tab:hover {
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
  }
  .dim-tab.active {
    color: #fff;
    background: var(--accent);
  }
</style>
{% endblock %}

{% block scripts %}
<script>
let barChart, pieChart;
let currentDim = 'model';

function switchDim(dim) {
  currentDim = dim;
  document.querySelectorAll('.dim-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + dim).classList.add('active');
  reload();
}

function clearDates() {
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  reload();
}

function reload() {
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const params = new URLSearchParams({ dimension: currentDim });
  if (from) params.set('start_date', from);
  if (to) params.set('end_date', to);
  loadCharts(params.toString());
  updateRangeHint(from, to);
}

function updateRangeHint(from, to) {
  const el = document.getElementById('range-text');
  if (from && to) {
    el.textContent = `${from} 至 ${to}`;
  } else if (from) {
    el.textContent = `${from} 至今`;
  } else if (to) {
    el.textContent = `截至 ${to}`;
  } else {
    el.textContent = '全部数据';
  }
}

async function loadCharts(query) {
  try {
    const res = await fetch('/api/usage/summary?' + query, { credentials: 'same-origin' });
    const data = await res.json();
    const items = data.items || data;
    if (!items || !items.length) {
      if (barChart) barChart.clear();
      if (pieChart) pieChart.clear();
      return;
    }

    const labels = items.map(i => i.model || i.department || i.username || i.agent_type_name || '—');
    const inputTokens = items.map(i => i.input_tokens || 0);
    const outputTokens = items.map(i => i.output_tokens || 0);
    const requestCounts = items.map(i => i.request_count || 0);

    // Update range hint with actual data range from API
    if (data.date_from || data.date_to) {
      const el = document.getElementById('range-text');
      const from = document.getElementById('f-from').value;
      const to = document.getElementById('f-to').value;
      // Only update if user hasn't set explicit filters
      if (!from && !to) {
        const dFrom = data.date_from ? data.date_from.slice(0, 10) : '—';
        const dTo = data.date_to ? data.date_to.slice(0, 10) : '—';
        el.textContent = `${dFrom} 至 ${dTo}（全部数据）`;
      }
    }

    // Stacked bar chart
    if (!barChart) {
      barChart = echarts.init(document.getElementById('chart-bar'));
      window.addEventListener('resize', () => barChart.resize());
    }
    barChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: '#1c1f2e', borderColor: 'rgba(255,255,255,0.1)', textStyle: { color: '#e8eaf0' } },
      legend: { data: ['输入 Tokens', '输出 Tokens'], textStyle: { color: '#8b90a0' } },
      grid: { left: 60, right: 20, top: 40, bottom: 30 },
      xAxis: { type: 'category', data: labels, axisLabel: { rotate: labels.length > 5 ? 30 : 0, color: '#8b90a0', fontSize: 11 }, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
      yAxis: { type: 'value', axisLabel: { color: '#8b90a0', fontSize: 11 }, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
      series: [
        { name: '输入 Tokens', type: 'bar', stack: 'total', data: inputTokens, itemStyle: { color: '#6366f1' } },
        { name: '输出 Tokens', type: 'bar', stack: 'total', data: outputTokens, itemStyle: { color: '#34d399' } },
      ],
    }, true);

    // Pie chart
    if (!pieChart) {
      pieChart = echarts.init(document.getElementById('chart-pie'));
      window.addEventListener('resize', () => pieChart.resize());
    }
    pieChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: '#1c1f2e', borderColor: 'rgba(255,255,255,0.1)', textStyle: { color: '#e8eaf0' } },
      series: [{
        type: 'pie', radius: ['40%', '70%'],
        data: labels.map((l, i) => ({ name: l, value: requestCounts[i] })),
        label: { show: true, formatter: '{b}\n{d}%', color: '#8b90a0', fontSize: 11 },
        itemStyle: { borderColor: '#161822', borderWidth: 2 },
        color: ['#6366f1', '#818cf8', '#a5b4fc', '#34d399', '#fbbf24', '#f87171', '#60a5fa', '#c084fc'],
      }],
    }, true);
  } catch (e) { console.error('loadCharts:', e); }
}

reload();
</script>
{% endblock %}
