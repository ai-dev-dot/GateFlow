<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — GateFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-page: #0f1117;
      --bg-surface: #161822;
      --bg-surface-raised: #1c1f2e;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-dark: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --text-primary: #e8eaf0;
      --text-secondary: #8b90a0;
      --text-muted: #555a6e;
      --border: rgba(255, 255, 255, 0.06);
      --border-light: rgba(255, 255, 255, 0.10);
      --danger: #f87171;
      --danger-subtle: rgba(248, 113, 113, 0.10);
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* Grid background pattern */
    .login-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .login-bg::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Glass card */
    .login-card {
      background: rgba(22, 24, 34, 0.80);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    /* Entrance animation */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fade-in-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .animate-delay-1 { animation-delay: 0.1s; }
    .animate-delay-2 { animation-delay: 0.2s; }
    .animate-delay-3 { animation-delay: 0.35s; }

    /* Inputs */
    input[type="text"],
    input[type="password"] {
      background: var(--bg-surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 14px;
      font-family: var(--font-sans);
      width: 100%;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input::placeholder { color: var(--text-muted); }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error */
    .login-error {
      background: var(--danger-subtle);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
    }

    /* Label */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="login-bg"></div>

  <div class="w-full max-w-sm relative z-10 px-4">
    <!-- Brand -->
    <div class="text-center mb-8 animate-in">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background: linear-gradient(135deg, var(--accent), var(--accent-dark)); box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold tracking-wide" style="color: var(--text-primary);">GateFlow</h1>
      <p class="text-xs mt-1 font-medium tracking-widest uppercase" style="color: var(--text-muted);">Enterprise AI Gateway</p>
    </div>

    <!-- Login Card -->
    <div class="login-card p-6 animate-in animate-delay-1">
      <div id="login-error" class="login-error hidden mb-4"></div>
      <form id="login-form">
        <div class="mb-4">
          <label>用户名</label>
          <input type="text" name="username" id="login-username" required autofocus autocomplete="username" placeholder="输入用户名">
        </div>
        <div class="mb-5">
          <label>密码</label>
          <input type="password" name="password" id="login-password" required autocomplete="current-password" placeholder="输入密码">
        </div>
        <button type="submit" id="login-btn" class="btn-login animate-delay-2">
          登录
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center mt-6 text-xs animate-in animate-delay-3" style="color: var(--text-muted);">
      GateFlow · AI 网关管理平台
    </p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('login-error');
      errDiv.classList.add('hidden');
      errDiv.textContent = '';

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = '登录中...';

      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          const msg = data.detail || '用户名或密码错误';
          errDiv.textContent = msg;
          errDiv.classList.remove('hidden');
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
          return;
        }

        const data = await res.json();
        document.cookie = `gf_session=${data.access_token}; path=/; max-age=${7 * 86400}; samesite=lax`;
        window.location.href = '/pages/chat';
      } catch (err) {
        errDiv.textContent = '网络错误，请稍后重试';
        errDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
